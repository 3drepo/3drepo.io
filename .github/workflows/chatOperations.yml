name: Chat Operations Dispatch
on:
  issue_comment:
    types: [ created ]
jobs:
  chatOperation:
    runs-on: ubuntu-latest
    steps:
      - name: Slash Command Dispatch
        uses: peter-evans/slash-command-dispatch@v3
        with:
          token: ${{ secrets.PROJ_MANAGEMENT_TOKEN }}
          # Deployment commands use registry and cluster secrets, so only
          # users with write access or above can dispatch them.
          permission: write
          commands: |
            deploy
            destroy
          issue-type: pull-request  # initially we only require pull request for operations to match /azp run
