name: Chat Operations Dispatch
on:
  issue_comment:
    types: [ created ]
jobs:
  chatOperation:
    runs-on: ubuntu-latest
    # Needed so GITHUB_TOKEN can set the acknowledgement reaction on the comment.
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Slash Command Dispatch
        uses: peter-evans/slash-command-dispatch@v5
        with:
          token: ${{ secrets.PROJ_MANAGEMENT_TOKEN }}
          reaction-token: ${{ secrets.GITHUB_TOKEN }}
          # Deployment commands use registry and cluster secrets, so only
          # users with write access or above can dispatch them.
          permission: write
          commands: |
            deploy
            destroy
          issue-type: pull-request  # deploy/destroy operations only apply to pull requests
