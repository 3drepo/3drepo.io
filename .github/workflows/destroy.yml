name: Destroy 3drepo.io instance

on:
  workflow_call:
    inputs:
      branch:
        description: Branch whose deployment should be destroyed.
        required: true
        type: string
  repository_dispatch:
    types:
      - destroy-command

permissions:
  contents: read

concurrency:
  group: destroy-${{ inputs.branch || github.event.client_payload.pull_request.number || github.event.client_payload.branch }}
  cancel-in-progress: true

jobs:
  deriveReleaseName:
    if: inputs.branch || github.event.client_payload.pull_request != null || github.event.client_payload.branch != null
    uses: ./.github/workflows/_deriveReleaseName.yml
    with:
      branch: ${{ inputs.branch || github.event.client_payload.pull_request.head.ref || github.event.client_payload.branch }}

  destroy:
    name: Destroy instance
    needs: deriveReleaseName
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      # ChatOps /destroy posts a status comment on the PR and edits it in place.
      # Skipped for the onPRClose path (no PR comment to update).
      - name: Comment destroy started
        id: destroy_comment
        if: github.event.client_payload.pull_request.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.client_payload.pull_request.number }}
          body: "🗑️ Destroying `${{ needs.deriveReleaseName.outputs.release_name }}`… ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))"

      - uses: azure/setup-helm@v4
        with:
          version: '4.0.1'

      - uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.2'

      - uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Destroy Helm release
        env:
          RELEASE_NAME: ${{ needs.deriveReleaseName.outputs.release_name }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_NAME" == "master" || "$RELEASE_NAME" == "staging" ]]; then
            echo "Refusing to destroy protected release '$RELEASE_NAME'." >&2
            exit 1
          fi
          helm uninstall "$RELEASE_NAME" --namespace default --ignore-not-found

      - name: Comment destroy succeeded
        if: success() && github.event.client_payload.pull_request.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.destroy_comment.outputs.comment-id }}
          edit-mode: replace
          body: "🗑️ Destroyed `${{ needs.deriveReleaseName.outputs.release_name }}` ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))"

      - name: Comment destroy failed
        if: failure() && github.event.client_payload.pull_request.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.destroy_comment.outputs.comment-id }}
          edit-mode: replace
          body: "❌ Destroy failed for `${{ needs.deriveReleaseName.outputs.release_name }}` ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))"
