name: On PR closed
on:
  pull_request:
    types: [closed]
permissions:
  contents: read
  issues: write
  pull-requests: read
jobs:
  get-details:
    name: Get Current Issue Details
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.commitMsgParser.outputs.issue-number }}
      issue-content-id: ${{ steps.commitMsgParser.outputs.issue-content-id }}
    steps:
      - name: Extract Issue Number from PR
        uses: 3drepo/extract-pr-information@v1
        with:
          pr: ${{ github.event.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        id: commitMsgParser

  tag-on-pr-merge:
    name: Tag merged issues as In staging if applicable
    runs-on: ubuntu-latest
    needs: get-details
    steps:
      - name: Apply in staging label
        if: ${{github.event.pull_request.merged && github.event.pull_request.base.ref == 'staging'}}
        uses: carmenfan/any-issue-labeller@v1.2
        with:
          issue-number: ${{ needs.get-details.outputs.issue-number }}
          label: 'in staging'
          github-token: ${{ secrets.GITHUB_TOKEN}}

  update-project-status:
    name: Update status of the issue in the project
    runs-on: ubuntu-latest
    needs: get-details
    steps:
      - name: Update status in the Project
        if: ${{github.event.pull_request.merged}}
        id: update_status
        uses: 3drepo/update-project-action@2.0
        with:
          github_token: ${{ secrets.PROJ_MANAGEMENT_TOKEN }}
          organization: 3drepo
          project_number: 22
          content_id: ${{ needs.get-details.outputs.issue-content-id }}
          field: Status
          value: Done

  destroy-deployed-branch:
    name: Tear down branch deployment
    runs-on: ubuntu-latest
    steps:
      # Hand off to .github/workflows/destroy.yml (same path as a /destroy
      # comment) by dispatching a destroy-command with the closed PR's branch.
      # The destroy workflow normalises the branch to the release name and
      # refuses to remove the protected master/staging releases itself.
      - name: Dispatch destroy for closed branch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PROJ_MANAGEMENT_TOKEN }}
          event-type: destroy-command
          client-payload: '{"branch": "${{ github.head_ref || github.ref_name }}"}'
